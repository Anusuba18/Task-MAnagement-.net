<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="form-group">
      <label>Email</label>
      <input class="form-control" type="email" placeholder="you@example.com" [(ngModel)]="user.email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" placeholder="••••••••" [(ngModel)]="user.password">
    </div>

    <button class="btn btn-primary btn-full" (click)="login()">Sign In</button>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </div>
  </div>
</div>

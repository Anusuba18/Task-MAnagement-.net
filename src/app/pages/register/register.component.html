<div class="auth-page">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join the task management platform</p>

    <div class="form-group">
      <label>Full Name</label>
      <input class="form-control" placeholder="John Doe" [(ngModel)]="user.name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input class="form-control" type="email" placeholder="you@example.com" [(ngModel)]="user.email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input class="form-control" type="password" placeholder="••••••••" [(ngModel)]="user.password">
    </div>

    <button class="btn btn-success btn-full" (click)="register()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a routerLink="/login">Sign In</a>
    </div>
  </div>
</div>
